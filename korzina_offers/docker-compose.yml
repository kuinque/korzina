services:
  korzina-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: korzina-offers-api
    ports:
      - "5000:5000"  # Проброс порта для доступа по IP
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0  # Принимать подключения со всех интерфейсов
      - PORT=5000
      - APP_ENV=production
      - DEBUG=false
    restart: unless-stopped
    networks:
      - korzina-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  korzina-network:
    driver: bridge

